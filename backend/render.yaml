services:
  - type: web
    name: honorario-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    envVars:
      - key: CORS_ORIGINS
        value: https://honorario-cf.vercel.app
      - key: DOCUSEAL_API_KEY
      - key: AZURE_TENANT_ID
      - key: AZURE_CLIENT_ID
      - key: AZURE_CLIENT_SECRET
      - key: AZURE_SENDER_EMAIL
